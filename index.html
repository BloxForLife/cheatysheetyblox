<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>blox</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0f172a;
      color: white;
    }

    body.locked {
      overflow: hidden;
    }

    body.locked .app,
    body.locked .toast {
      display: none;
    }

    .password-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: white;
      color: black;
    }

    .password-form {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: bold;
    }

    .password-form input {
      width: 180px;
      border: none;
      border-bottom: 1px solid black;
      outline: none;
      background: transparent;
      color: black;
      font: inherit;
    }

    .password-screen.hidden {
      display: none;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: #111827;
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .brand {
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .brand h1 {
      font-size: 24px;
      line-height: 1.1;
    }

    .brand p {
      font-size: 12px;
      font-weight: bold;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .menu-title {
      color: #cbd5e1;
      font-size: 13px;
      font-weight: bold;
      margin: 14px 0 10px;
    }

    .subject-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #1f2937;
      color: white;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .subject-btn:hover {
      background: #273449;
    }

    .subject-btn.active {
      background: #22c55e;
    }

    .count {
      background: rgba(255,255,255,0.2);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
    }

    .note {
      color: #cbd5e1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 14px;
      border-radius: 14px;
      font-size: 12px;
      line-height: 1.5;
      margin-top: 15px;
    }

    .main {
      padding: 24px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    h2 {
      font-size: 34px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button.action {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      background: #334155;
    }

    #copyBtn {
      background: #22c55e;
    }

    #allBtn {
      background: #f97316;
    }

    #printBtn {
      background: #3b82f6;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    #searchInput {
      border: 1px solid rgba(255,255,255,0.15);
      outline: none;
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
    }

    #searchInput::placeholder {
      color: #94a3b8;
    }

    #clearBtn {
      border: none;
      border-radius: 16px;
      padding: 0 18px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #f8fafc;
      color: #0f172a;
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .card-header {
      background: white;
      padding: 18px 22px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .pill {
      background: #dcfce7;
      color: #166534;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .answer-area {
      overflow-y: auto;
      padding: 22px;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }

    .answer-line {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      line-height: 1.45;
    }

    .answer-line.arabic {
      direction: rtl;
      text-align: right;
      font-size: 15px;
    }

    .section-heading {
      grid-column: 1 / -1;
      background: #0f172a;
      color: white;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: bold;
      margin-top: 8px;
    }

    mark {
      background: #fde68a;
      border-radius: 4px;
      padding: 0 2px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: #111827;
      color: white;
      padding: 13px 16px;
      border-radius: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.2s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 850px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .main {
        min-height: 800px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media print {
      .sidebar, .actions, .search-row {
        display: none;
      }

      .app {
        display: block;
        height: auto;
      }

      body {
        background: white;
        color: black;
      }

      .main {
        display: block;
        padding: 0;
      }

      .card {
        box-shadow: none;
        border-radius: 0;
      }

      .answer-area {
        overflow: visible;
      }
    }
  </style>
</head>

      <section class="search-row">

      <section class="card">

        </div>

        <div class="answer-area">
          <div id="answersContainer" class="answer-grid"></div>
        </div>
      </section>
    </main>
  </div>

    const subjectMenu = document.getElementById("subjectMenu");
    const answersContainer = document.getElementById("answersContainer");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const cardTitle = document.getElementById("cardTitle");
    const statusPill = document.getElementById("statusPill");
    const searchInput = document.getElementById("searchInput");
    const toast = document.getElementById("toast");
    const passwordScreen = document.getElementById("passwordScreen");
    const passwordForm = document.getElementById("passwordForm");
    const passwordInput = document.getElementById("passwordInput");
    const pagePassword = "bloxahmad123";

    let currentSubject = "ICT ANSWERS";
    let allMode = false;

    function unlockPage() {
      document.body.classList.remove("locked");
      passwordScreen.classList.add("hidden");
      sessionStorage.setItem("answersUnlocked", "true");
    }

    if (sessionStorage.getItem("answersUnlocked") === "true") {
      unlockPage();
    } else {
      passwordInput.focus();
    }

    passwordForm.addEventListener("submit", function (event) {
      event.preventDefault();

      if (passwordInput.value === pagePassword) {
        unlockPage();
      } else {
        passwordInput.value = "";
        passwordInput.focus();
      }
    });

    function isHeading(line) {
      return /^[A-Z0-9\s\-]+$/.test(line) && !/^\d/.test(line) && line.length > 8;
    }

    function formatLine(line) {
      if (isHeading(line)) return line;

      const match = line.match(/^([0-9]+)\s*[-]\s*([a-dA-D])?\s*/);
      if (match) {
        return match[1] + ". " + line.slice(match[0].length);
      }

      const matchNoLetter = line.match(/^([0-9]+)\s*[-]\s*/);
      if (matchNoLetter) {
        return matchNoLetter[1] + ". " + line.slice(matchNoLetter[0].length);
      }

      return line;
    }

    function countAnswers(subject) {
      return answers[subject].filter(line => !isHeading(line)).length;
    }

    function buildMenu() {
      subjectMenu.innerHTML = "";

      Object.keys(answers).forEach(subject => {
        const btn = document.createElement("button");
        btn.className = "subject-btn" + (subject === currentSubject && !allMode ? " active" : "");
        btn.innerHTML = "<span>" + subject.replace(" ANSWERS", "") + "</span><span class='count'>" + countAnswers(subject) + "</span>";

        btn.onclick = function () {
          currentSubject = subject;
          allMode = false;
          searchInput.value = "";
          buildMenu();
          renderAnswers();
        };

        subjectMenu.appendChild(btn);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function highlight(text, query) {
      const safeText = escapeHtml(text);
      if (!query) return safeText;

      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp("(" + escapedQuery + ")", "gi");
      return safeText.replace(regex, "<mark>$1</mark>");
    }

    function makeLine(line, query, subject) {
      const div = document.createElement("div");
      div.className = isHeading(line) ? "section-heading" : "answer-line";

      if (["ARABIC ANSWERS", "ISLAM ANSWERS", "SOCIAL STUDIES ANSWERS"].includes(subject) && !isHeading(line)) {
        div.className += " arabic";
      }

      div.innerHTML = highlight(formatLine(line), query);
      return div;
    }

    function renderSubject(subject, query) {
      const subjectHeading = document.createElement("div");
      subjectHeading.className = "section-heading";
      subjectHeading.textContent = subject;
      answersContainer.appendChild(subjectHeading);

      let shown = 0;

      answers[subject].forEach(line => {
        const formatted = formatLine(line);
        const match = !query || formatted.toLowerCase().includes(query) || subject.toLowerCase().includes(query);

        if (match) {
          answersContainer.appendChild(makeLine(line, query, subject));
          if (!isHeading(line)) shown++;
        }
      });

      return shown;
    }

    function renderAnswers() {
      const query = searchInput.value.trim().toLowerCase();
      answersContainer.innerHTML = "";

      if (allMode) {
        pageTitle.textContent = "All Answers";
        pageSubtitle.textContent = "Every subject in one page.";
        cardTitle.textContent = "ALL ANSWERS";

        let total = 0;
        Object.keys(answers).forEach(subject => {
          total += renderSubject(subject, query);
        });

        statusPill.textContent = total + " shown";
        return;
      }

      pageTitle.textContent = currentSubject.replace(" ANSWERS", " Answers");
      pageSubtitle.textContent = "Clickable answer sheet with quick search.";
      cardTitle.textContent = currentSubject;

      let shown = 0;

      answers[currentSubject].forEach(line => {
        const formatted = formatLine(line);
        const match = !query || formatted.toLowerCase().includes(query);

        if (match) {
          answersContainer.appendChild(makeLine(line, query, currentSubject));
          if (!isHeading(line)) shown++;
        }
      });

      statusPill.textContent = query ? shown + " found" : countAnswers(currentSubject) + " answers";
    }

    function showAll() {
      allMode = true;
      searchInput.value = "";
      buildMenu();
      renderAnswers();
    }

    function clearSearch() {
      searchInput.value = "";
      renderAnswers();
      searchInput.focus();
    }

    function currentText() {
      if (allMode) {
        return Object.keys(answers).map(subject => {
          return subject + "\n\n" + answers[subject].map(formatLine).join("\n");
        }).join("\n\n--------------------\n\n");
      }

      return currentSubject + "\n\n" + answers[currentSubject].map(formatLine).join("\n");
    }

    async function copyCurrent() {
      try {
        await navigator.clipboard.writeText(currentText());
        showToast("Copied!");
      } catch (e) {
        showToast("Copy failed.");
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      setTimeout(function () {
        toast.classList.remove("show");
      }, 1600);
    }

    buildMenu();
    renderAnswers();
  </script>
